<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NUSACYBERA — Countdown</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #00e5ff;
      --bg: #080c14;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.12);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Space Mono', monospace;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    #glow {
      position: fixed;
      width: 700px; height: 700px;
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      transition: background 1.2s ease;
    }

    .wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding-bottom: 80px;
    }

    #badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border-radius: 100px;
      padding: 8px 20px;
      margin-bottom: 22px;
      transition: border-color 1.2s, box-shadow 1.2s;
    }

    #dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
      transition: background 1.2s, box-shadow 1.2s;
    }

    #badge-text {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 700;
      transition: color 1.2s;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(1.1rem, 4vw, 1.9rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 40px;
      text-align: center;
      transition: background 1.2s;
    }

    #status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      border-radius: 8px;
      padding: 10px 24px;
      margin-bottom: 40px;
      transition: background 1.2s, border-color 1.2s;
    }

    #status-text {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      transition: color 1.2s;
    }

    .countdown-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .digit-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .digit-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 28px;
      min-width: 90px;
      text-align: center;
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: 800;
      letter-spacing: 0.05em;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
      transition: color 1.2s;
    }

    .digit-label {
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.45;
    }

    .sep {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 800;
      margin-bottom: 28px;
      transition: opacity 0.2s, color 1.2s;
      user-select: none;
    }

    .info-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 52px;
    }

    .info-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 28px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .info-icon { font-size: 1.2rem; margin-bottom: 4px; }

    .info-label {
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 4px;
    }

    .info-value {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      font-weight: 700;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 16px 16px;
      background: linear-gradient(to top, rgba(8,12,20,0.95) 60%, transparent);
      z-index: 1;
      text-align: center;
    }

    .footer-copy {
      font-size: 0.55rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.18;
    }

    .footer-credit {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.75;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .footer-credit .divider {
      width: 30px;
      height: 1px;
      opacity: 0.5;
      display: inline-block;
      transition: background 1.2s;
    }

    .footer-credit .by {
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      opacity: 0.5;
      letter-spacing: 0.15em;
      font-weight: 400;
    }

    .footer-credit .names { transition: color 1.2s; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    @media (max-width: 480px) {
      .digit-card { min-width: 72px; padding: 14px 18px; }
      .info-row { gap: 10px; }
      .info-card { padding: 12px 18px; }
    }
  </style>
</head>
<body>

<div id="glow"></div>

<div class="wrap">

  <div id="badge">
    <div id="dot"></div>
    <span id="badge-text">NUSACYBERA</span>
  </div>

  <h1 id="title">Memuat Status...</h1>

  <div id="status-pill">
    <span id="status-text">—</span>
  </div>

  <div class="countdown-row">
    <div class="digit-block">
      <div class="digit-card" id="d-h">00</div>
      <div class="digit-label">Jam</div>
    </div>
    <div class="sep" id="sep1">:</div>
    <div class="digit-block">
      <div class="digit-card" id="d-m">00</div>
      <div class="digit-label">Menit</div>
    </div>
    <div class="sep" id="sep2">:</div>
    <div class="digit-block">
      <div class="digit-card" id="d-s">00</div>
      <div class="digit-label">Detik</div>
    </div>
  </div>

  <div class="info-row">
    <div class="info-card">
      <div class="info-icon">🟢</div>
      <div class="info-label">Buka</div>
      <div class="info-value">06:00 WIB</div>
    </div>
    <div class="info-card">
      <div class="info-icon">🔴</div>
      <div class="info-label">Tutup</div>
      <div class="info-value">00:00 WIB</div>
    </div>
  </div>

</div>

<footer>
  <div class="footer-credit">
    <span class="divider" id="divider-l"></span>
    <span class="by">by</span>
    <span class="names" id="footer-names">ADMIN &amp; MODERATOR</span>
    <span class="divider" id="divider-r"></span>
  </div>
  <div class="footer-copy">NUSACYBERA &copy; <span id="yr"></span></div>
</footer>

<script>
  document.getElementById('yr').textContent = new Date().getFullYear();

  const COLOR_OPEN   = '#00e5ff';
  const COLOR_CLOSED = '#ff4444';

  function pad(n) { return String(n).padStart(2, '0'); }

  function getState() {
    const now   = new Date();
    const total = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
    const open  = 6 * 3600;
    const close = 24 * 3600;
    if (total >= 0 && total < open) {
      return { open: false, remaining: open - total };
    } else {
      return { open: true, remaining: close - total };
    }
  }

  function applyColor(color) {
    document.getElementById('dot').style.background        = color;
    document.getElementById('dot').style.boxShadow         = `0 0 10px ${color}`;
    document.getElementById('badge-text').style.color      = color;
    document.getElementById('badge').style.border          = `1px solid ${color}44`;
    document.getElementById('badge').style.boxShadow       = `0 0 20px ${color}22`;
    document.getElementById('status-text').style.color     = color;
    document.getElementById('status-pill').style.background= `${color}18`;
    document.getElementById('status-pill').style.border    = `1px solid ${color}55`;
    document.getElementById('sep1').style.color            = color;
    document.getElementById('sep2').style.color            = color;
    document.getElementById('d-h').style.color             = color;
    document.getElementById('d-m').style.color             = color;
    document.getElementById('d-s').style.color             = color;
    document.getElementById('glow').style.background       = `radial-gradient(circle, ${color}18 0%, transparent 70%)`;
    document.querySelector('h1').style.backgroundImage     = `linear-gradient(135deg, #fff 30%, ${color})`;
    document.getElementById('footer-names').style.color    = color;
    document.getElementById('divider-l').style.background  = color;
    document.getElementById('divider-r').style.background  = color;
  }

  let sepVisible = true;
  setInterval(() => {
    sepVisible = !sepVisible;
    const op = sepVisible ? '0.85' : '0.1';
    document.getElementById('sep1').style.opacity = op;
    document.getElementById('sep2').style.opacity = op;
  }, 500);

  function tick() {
    const { open, remaining } = getState();
    const h = Math.floor(remaining / 3600);
    const m = Math.floor((remaining % 3600) / 60);
    const s = remaining % 60;

    document.getElementById('d-h').textContent = pad(h);
    document.getElementById('d-m').textContent = pad(m);
    document.getElementById('d-s').textContent = pad(s);

    if (open) {
      document.getElementById('title').textContent       = 'Grup Sedang Aktif';
      document.getElementById('status-text').textContent = '⏰ Tutup jam 00:00 WIB — Sisa waktu';
      applyColor(COLOR_OPEN);
    } else {
      document.getElementById('title').textContent       = 'Grup Sedang Tutup';
      document.getElementById('status-text').textContent = '🔒 Buka jam 06:00 WIB — Sisa waktu';
      applyColor(COLOR_CLOSED);
    }
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
