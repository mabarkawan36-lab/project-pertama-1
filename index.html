<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IKY DEV - Ultimate Modern</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Poppins', sans-serif;
scroll-behavior:smooth;
}

body{
background:#0f0f1a;
color:white;
overflow-x:hidden;
}

/* ===== LOADING SCREEN ===== */
.loader{
position:fixed;
width:100%;
height:100%;
background:#0f0f1a;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:24px;
letter-spacing:3px;
animation: fadeOut 1s ease forwards;
animation-delay:2s;
}

@keyframes fadeOut{
to{
opacity:0;
visibility:hidden;
}
}

/* ===== PARTICLE CANVAS ===== */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* ===== NAVBAR ===== */
nav{
position:fixed;
width:100%;
padding:20px 50px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
transition:0.3s;
}

nav a:hover{
color:#00f2fe;
}

/* ===== HERO ===== */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:60px;
background:linear-gradient(90deg,#00f2fe,#4facfe,#a6ffcb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation: fadeUp 1s ease forwards;
}

.hero p{
margin-top:20px;
opacity:0.8;
animation: fadeUp 1.5s ease forwards;
}

.btn{
margin-top:30px;
padding:15px 40px;
border-radius:50px;
border:none;
cursor:pointer;
background:linear-gradient(90deg,#00f2fe,#4facfe);
color:black;
font-weight:bold;
transition:0.3s;
position:relative;
}

.btn:hover{
transform:scale(1.1);
}

/* ===== SECTION ===== */
section{
padding:120px 40px;
text-align:center;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.card{
width:300px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
transition:0.5s;
opacity:0;
transform:translateY(50px);
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card:hover{
transform:translateY(-10px) scale(1.05);
}

/* ===== CURSOR GLOW ===== */
.cursor{
position:fixed;
width:20px;
height:20px;
border-radius:50%;
background:#00f2fe;
pointer-events:none;
mix-blend-mode:difference;
transition:transform 0.1s ease;
z-index:999;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

@media(max-width:768px){
.hero h1{font-size:35px;}
}
</style>
</head>

<body>

<div class="loader">IKY DEV LOADING...</div>
<canvas id="particles"></canvas>
<div class="cursor"></div>

<nav>
<div><strong>IKY DEV</strong></div>
<div>
<a href="#">Home</a>
<a href="#about">About</a>
<a href="#project">Project</a>
</div>
</nav>

<div class="hero">
<h1>Next Level Experience</h1>
<p>Ultimate Modern Website — All In One File</p>
<button class="btn">Explore</button>
</div>

<section id="about">
<h2>About This Site</h2>
<div class="cards">
<div class="card">Particle Background</div>
<div class="card">Cursor Glow</div>
<div class="card">Cinematic UI</div>
</div>
</section>

<section id="project">
<h2>Projects</h2>
<div class="cards">
<div class="card">Project Alpha</div>
<div class="card">Project Beta</div>
<div class="card">Project Gamma</div>
</div>
</section>

<script>
/* ===== SCROLL REVEAL ===== */
const cards=document.querySelectorAll(".card");
window.addEventListener("scroll",()=>{
const trigger=window.innerHeight*0.85;
cards.forEach(card=>{
const top=card.getBoundingClientRect().top;
if(top<trigger){
card.classList.add("show");
}
});
});

/* ===== BUTTON SCROLL ===== */
document.querySelector(".btn").onclick=()=>{
document.querySelector("#about").scrollIntoView({behavior:"smooth"});
};

/* ===== CURSOR GLOW ===== */
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* ===== PARTICLE SYSTEM ===== */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particlesArray=[];

class Particle{
constructor(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.size=Math.random()*2+1;
this.speedX=Math.random()*1-0.5;
this.speedY=Math.random()*1-0.5;
}
update(){
this.x+=this.speedX;
this.y+=this.speedY;

if(this.x>canvas.width || this.x<0) this.speedX*=-1;
if(this.y>canvas.height || this.y<0) this.speedY*=-1;
}
draw(){
ctx.fillStyle="rgba(255,255,255,0.7)";
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fill();
}
}

function init(){
for(let i=0;i<100;i++){
particlesArray.push(new Particle());
}
}
init();

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particlesArray.forEach(p=>{
p.update();
p.draw();
});
requestAnimationFrame(animate);
}
animate();

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});
</script>

</body>
</html>
